data_info:
  root_path: ""  # Data root path 
  csv_root_path: ""  # Path to the folder containing split csv's
  apply_l2: True  # Apply l2 normalization of input features (always used in our experiments)
  input_type: ""  # video, audio, multimodal (CAREFUL: should be the same as in the model_hparams section)

model_hparams:
  input_type: ""  # video, audio, multimodal (CAREFUL: should be the same as in the data_info section)
  feats_dim: 1024  # dimension of input feats

callbacks:
  logger:
    log_path: ""  # Path to the folder to save the logs
    name: "csv"
  ckpt_args:
    ckpt_dir: ""  # Path to the folder to save the model checkpoints
    metric: "val_loss"
    mode: "min"
  early_stopping:
    metric: "val_loss"
    mode: "min"
    patience: 10

epochs: 100
seed: 43